# GFS Client Development Environment Configuration
server:
  type: "client"
  id: "client-dev-01"
  environment: "development"

storage:
  chunk_size: 67108864  # 64MB
  max_chunk_size: 67108864
  replication_factor: 3
  data_dir: ""  # Clients don't store data locally
  metadata_dir: ""
  enable_checksum: true

network:
  host: "localhost"
  port: 0  # Clients typically use ephemeral ports
  master_address: "localhost:50051"
  max_connections: 10
  read_timeout: "30s"
  write_timeout: "30s"
  keep_alive: true

timing:
  heartbeat_interval: "10s"
  lease_timeout: "60s"
  retry_attempts: 3
  retry_delay: "1s"
  gc_interval: "30m"
  checkpoint_interval: "5s"

logging:
  level: "info"
  format: "text"
  output_path: "stdout"
  max_file_size: 104857600  # 100MB
  max_files: 10
  enable_console: true